name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Run tests
        run: go test ./...

      - name: Build CLI
        run: go build ./cmd/agentskeleton
