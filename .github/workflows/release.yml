name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          bin_name="agentskeleton-${GOOS}-${GOARCH}"
          go build \
            -ldflags "-X github.com/Super-Sky/AgentSkeleton/internal/app.Version=${GITHUB_REF_NAME} -X github.com/Super-Sky/AgentSkeleton/internal/app.Commit=${GITHUB_SHA} -X github.com/Super-Sky/AgentSkeleton/internal/app.Date=$(date -u +%Y-%m-%d)" \
            -o "dist/${bin_name}" \
            ./cmd/agentskeleton

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentskeleton-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/agentskeleton-${{ matrix.goos }}-${{ matrix.goarch }}
